<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV v6</title>

<style>
body{
margin:0;
background:#070b14;
font-family:sans-serif;
color:white;
text-align:center;
}

.header{
background:#0f1628;
padding:12px;
font-size:20px;
color:#4da3ff;
font-weight:bold;
}

video{
width:100%;
max-width:900px;
background:black;
margin-top:10px;
border-radius:10px;
}

.controls button,
.sectionBtns button{
padding:7px 14px;
margin:4px;
border:none;
border-radius:8px;
background:#1f3a6b;
color:white;
font-size:13px;
}

.sectionBtns button.active{
background:#2e6bff;
}

.sectionTitle{
margin-top:10px;
font-size:15px;
color:#9ecbff;
}

.channels{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
padding:10px;
}

.channels button{
padding:9px;
border:none;
border-radius:8px;
background:#16233f;
color:white;
font-size:13px;
}

.channels button.active{
background:#2e6bff;
}

@media (min-width:700px){
.channels{
grid-template-columns:repeat(5,1fr);
}
}
</style>
</head>

<body>

<div class="header">IPTV v6</div>

<video id="player" controls autoplay></video>

<div class="controls">
<button onclick="prev()">قبلی</button>
<button onclick="reload()">رفرش</button>
<button onclick="next()">بعدی</button>
</div>

<div class="sectionBtns">
<button id="btn1" onclick="showSection(1)">اینترنت ملی </button>
<button id="btn2" onclick="showSection(2)">اینترنت</button>
</div>
<div id="sectionTitle" class="sectionTitle"></div>
<div id="channels" class="channels"></div>

<script>

]

let video=document.getElementById("player")
let current=0
let section=1
let freezeTimer
let lastTime=0

function showSection(s){
section=s
document.getElementById("btn1").classList.toggle("active",s===1)
document.getElementById("btn2").classList.toggle("active",s===2)
build()
}

function build(){
let div=document.getElementById("channels")
div.innerHTML=""
let start=section===1?0:18
let end=section===1?18:40

for(let i=start;i<end;i++){
let b=document.createElement("button")
b.innerText=channels[i].name
if(i===current) b.classList.add("active")
b.onclick=()=>play(i)
div.appendChild(b)
}
}

function play(i){
current=i
video.src=channels[i].url
video.play()
localStorage.setItem("iptv",i)
build()
freezeCheck()
}

function reload(){
video.src=channels[current].url
video.play()
}

function next(){
current=(current+1)%channels.length
play(current)
}

function prev(){
current=(current-1+channels.length)%channels.length
play(current)
}

function freezeCheck(){
clearInterval(freezeTimer)
freezeTimer=setInterval(()=>{
if(video.currentTime===lastTime){
reload()
}
lastTime=video.currentTime
},FREEZE_TIME)
}

video.onerror=function(){
setTimeout(reload,RELOAD_TIME)
}

window.onload=function(){
let last=localStorage.getItem("iptv")
if(last) current=parseInt(last)
showSection(current<10?1:2)
play(current)
}
</script>

</body>
</html>
